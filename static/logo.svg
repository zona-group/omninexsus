<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Main gradient: indigo → purple → cyan -->
    <linearGradient id="gMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366f1"/>
      <stop offset="50%"  stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <!-- Node glow gradient -->
    <radialGradient id="gCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.8"/>
    </radialGradient>
    <radialGradient id="gNode" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.7"/>
    </radialGradient>
    <!-- Outer ring glow -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="centerGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle (dark) -->
  <circle cx="100" cy="100" r="96" fill="#0d1424" stroke="url(#gMain)" stroke-width="1.5" opacity="0.6"/>

  <!-- ── CONNECTION LINES (drawn first, behind nodes) ── -->
  <!-- Center to all outer nodes -->
  <line x1="100" y1="100" x2="100" y2="38"  stroke="url(#gMain)" stroke-width="1.2" opacity="0.5"/>
  <line x1="100" y1="100" x2="156" y2="62"  stroke="url(#gMain)" stroke-width="1.2" opacity="0.5"/>
  <line x1="100" y1="100" x2="156" y2="138" stroke="url(#gMain)" stroke-width="1.2" opacity="0.5"/>
  <line x1="100" y1="100" x2="100" y2="162" stroke="url(#gMain)" stroke-width="1.2" opacity="0.5"/>
  <line x1="100" y1="100" x2="44"  y2="138" stroke="url(#gMain)" stroke-width="1.2" opacity="0.5"/>
  <line x1="100" y1="100" x2="44"  y2="62"  stroke="url(#gMain)" stroke-width="1.2" opacity="0.5"/>

  <!-- Outer ring connections (hexagonal) -->
  <line x1="100" y1="38"  x2="156" y2="62"  stroke="#6366f1" stroke-width="0.8" opacity="0.35"/>
  <line x1="156" y1="62"  x2="156" y2="138" stroke="#6366f1" stroke-width="0.8" opacity="0.35"/>
  <line x1="156" y1="138" x2="100" y2="162" stroke="#6366f1" stroke-width="0.8" opacity="0.35"/>
  <line x1="100" y1="162" x2="44"  y2="138" stroke="#6366f1" stroke-width="0.8" opacity="0.35"/>
  <line x1="44"  y1="138" x2="44"  y2="62"  stroke="#6366f1" stroke-width="0.8" opacity="0.35"/>
  <line x1="44"  y1="62"  x2="100" y2="38"  stroke="#6366f1" stroke-width="0.8" opacity="0.35"/>

  <!-- Skip connections (cross-links) -->
  <line x1="100" y1="38"  x2="156" y2="138" stroke="#a855f7" stroke-width="0.6" opacity="0.2"/>
  <line x1="156" y1="62"  x2="44"  y2="138" stroke="#a855f7" stroke-width="0.6" opacity="0.2"/>
  <line x1="156" y1="138" x2="44"  y2="62"  stroke="#a855f7" stroke-width="0.6" opacity="0.2"/>
  <line x1="100" y1="162" x2="44"  y2="62"  stroke="#a855f7" stroke-width="0.6" opacity="0.2"/>
  <line x1="100" y1="38"  x2="44"  y2="138" stroke="#a855f7" stroke-width="0.6" opacity="0.2"/>
  <line x1="156" y1="62"  x2="100" y2="162" stroke="#a855f7" stroke-width="0.6" opacity="0.2"/>

  <!-- ── OUTER NODES (hexagonal layout) ── -->
  <!-- Top -->
  <circle cx="100" cy="38" r="9" fill="#0d1424" stroke="url(#gMain)" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="100" cy="38" r="5" fill="url(#gNode)"/>

  <!-- Top-right -->
  <circle cx="156" cy="62" r="9" fill="#0d1424" stroke="url(#gMain)" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="156" cy="62" r="5" fill="url(#gNode)"/>

  <!-- Bottom-right -->
  <circle cx="156" cy="138" r="9" fill="#0d1424" stroke="url(#gMain)" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="156" cy="138" r="5" fill="url(#gNode)"/>

  <!-- Bottom -->
  <circle cx="100" cy="162" r="9" fill="#0d1424" stroke="url(#gMain)" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="100" cy="162" r="5" fill="url(#gNode)"/>

  <!-- Bottom-left -->
  <circle cx="44" cy="138" r="9" fill="#0d1424" stroke="url(#gMain)" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="44" cy="138" r="5" fill="url(#gNode)"/>

  <!-- Top-left -->
  <circle cx="44" cy="62" r="9" fill="#0d1424" stroke="url(#gMain)" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="44" cy="62" r="5" fill="url(#gNode)"/>

  <!-- ── CENTER NODE (main hub) ── -->
  <!-- Outer pulse ring -->
  <circle cx="100" cy="100" r="28" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.3" filter="url(#softGlow)"/>
  <circle cx="100" cy="100" r="22" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.4"/>

  <!-- Center background -->
  <circle cx="100" cy="100" r="18" fill="#0d1424" stroke="url(#gMain)" stroke-width="2" filter="url(#centerGlow)"/>

  <!-- Center fill -->
  <circle cx="100" cy="100" r="14" fill="url(#gCenter)"/>

  <!-- "N" letter in center -->
  <text x="100" y="106"
        font-family="'Inter','Manrope','Arial Black',sans-serif"
        font-size="14" font-weight="900"
        text-anchor="middle"
        fill="white"
        letter-spacing="-0.5">N</text>
</svg>
