<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — OmniNexus</title>
  <link rel="stylesheet" href="/static/css/main.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <a class="brand-link" href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" width="32" height="32">
        <defs>
          <linearGradient id="gM" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#6366f1"/><stop offset="50%" stop-color="#a855f7"/><stop offset="100%" stop-color="#22d3ee"/></linearGradient>
          <radialGradient id="gC" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#6366f1" stop-opacity="0.8"/></radialGradient>
          <radialGradient id="gN" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#6366f1" stop-opacity="0.7"/></radialGradient>
        </defs>
        <line x1="100" y1="100" x2="100" y2="38"  stroke="url(#gM)" stroke-width="1.5" opacity="0.6"/>
        <line x1="100" y1="100" x2="156" y2="62"  stroke="url(#gM)" stroke-width="1.5" opacity="0.6"/>
        <line x1="100" y1="100" x2="156" y2="138" stroke="url(#gM)" stroke-width="1.5" opacity="0.6"/>
        <line x1="100" y1="100" x2="100" y2="162" stroke="url(#gM)" stroke-width="1.5" opacity="0.6"/>
        <line x1="100" y1="100" x2="44"  y2="138" stroke="url(#gM)" stroke-width="1.5" opacity="0.6"/>
        <line x1="100" y1="100" x2="44"  y2="62"  stroke="url(#gM)" stroke-width="1.5" opacity="0.6"/>
        <line x1="100" y1="38"  x2="156" y2="62"  stroke="#6366f1" stroke-width="0.9" opacity="0.4"/>
        <line x1="156" y1="62"  x2="156" y2="138" stroke="#6366f1" stroke-width="0.9" opacity="0.4"/>
        <line x1="156" y1="138" x2="100" y2="162" stroke="#6366f1" stroke-width="0.9" opacity="0.4"/>
        <line x1="100" y1="162" x2="44"  y2="138" stroke="#6366f1" stroke-width="0.9" opacity="0.4"/>
        <line x1="44"  y1="138" x2="44"  y2="62"  stroke="#6366f1" stroke-width="0.9" opacity="0.4"/>
        <line x1="44"  y1="62"  x2="100" y2="38"  stroke="#6366f1" stroke-width="0.9" opacity="0.4"/>
        <circle cx="100" cy="38"  r="8" fill="#0d1424" stroke="url(#gM)" stroke-width="1.5"/><circle cx="100" cy="38"  r="4.5" fill="url(#gN)"/>
        <circle cx="156" cy="62"  r="8" fill="#0d1424" stroke="url(#gM)" stroke-width="1.5"/><circle cx="156" cy="62"  r="4.5" fill="url(#gN)"/>
        <circle cx="156" cy="138" r="8" fill="#0d1424" stroke="url(#gM)" stroke-width="1.5"/><circle cx="156" cy="138" r="4.5" fill="url(#gN)"/>
        <circle cx="100" cy="162" r="8" fill="#0d1424" stroke="url(#gM)" stroke-width="1.5"/><circle cx="100" cy="162" r="4.5" fill="url(#gN)"/>
        <circle cx="44"  cy="138" r="8" fill="#0d1424" stroke="url(#gM)" stroke-width="1.5"/><circle cx="44"  cy="138" r="4.5" fill="url(#gN)"/>
        <circle cx="44"  cy="62"  r="8" fill="#0d1424" stroke="url(#gM)" stroke-width="1.5"/><circle cx="44"  cy="62"  r="4.5" fill="url(#gN)"/>
        <circle cx="100" cy="100" r="22" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.35"/>
        <circle cx="100" cy="100" r="18" fill="#0d1424" stroke="url(#gM)" stroke-width="2"/>
        <circle cx="100" cy="100" r="13" fill="url(#gC)"/>
        <text x="100" y="106" font-family="Arial Black,sans-serif" font-size="14" font-weight="900" text-anchor="middle" fill="white">N</text>
      </svg>
      <span class="brand-link">OmniNexus</span>
    </a>
    <h1>Login</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="form-error">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST" action="/auth/login">
      <input name="email" type="email" placeholder="Email" required />
      <input name="password" type="password" placeholder="Password" required />
      <label class="remember-label">
        <input name="remember" type="checkbox" /> Remember me
      </label>
      <button class="btn btn-primary full-w" type="submit">Login</button>
    </form>
    <p class="switch-auth">No account? <a href="/auth/register">Sign up</a></p>
  </div>
</body>
</html>
