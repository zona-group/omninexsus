<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — OmniNexus</title>
  <link rel="stylesheet" href="/static/css/main.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <a class="brand-link" href="/">🌐 OmniNexus</a>
    <h1>Profile</h1>
    <div class="profile-info">
      <div class="avatar-wrap">
        {% if user.avatar %}
          <img src="{{ user.avatar }}" alt="avatar" class="avatar-img" />
        {% else %}
          <div class="avatar-placeholder">{{ user.username[0].upper() }}</div>
        {% endif %}
      </div>
      <h2>{{ user.username }}</h2>
      <p>{{ user.email }}</p>
      <p>{{ user.bio or 'No bio yet.' }}</p>
    </div>
    <a href="/" class="btn full-w">Back to News</a>
    <a href="/auth/logout" class="btn full-w" style="margin-top:8px">Logout</a>
  </div>
</body>
</html>
